<!DOCTYPE html>
<html>
<head>
<meta charset="windows-1251"> <!-- специально НЕ UTF-8, чтобы проверить сущности! -->
<title>Translit1E — Новый транслит для русских букв</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.mode-btn { padding: 8px 16px; margin: 5px; font-size: 16px; }
.test-block { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
.hidden {display:none;}
</style>
</head>
<body>

<h1 id="id_str">~3to Translit-1E.~/3to Translit-1E. (No JS + No rus font)</h1>
<h2>Введите в поле тр2+декодер или рус+енкодер</h2>
<textarea spellcheck="false" id="id_input" rows="3" cols="100">
~Proverka: Privet! 1N 1Exik, 1T 1Wuka i 1lQla1r ~~ kak xizn6? 13to 1L Translit1E! 1Z~
</textarea>
<br>
<button class="mode-btn" onclick="decode_text()"> decode t1e-rus</button>
<button class="mode-btn" onclick="encode_text()"> encode rus-t1e</button>
<button class="mode-btn" onclick="testAlert()"> test alert()</button><br>

<div class="test-block">
  <h3>js-unicode (any charset)</h3>
  <p id="id_put1">1</p>
</div>

<div class="test-block">
  <h3>html-znaki (any charset)</h3>
  <p id="id_put2">2</p>
</div>

<div class="test-block">
  <h3>encode from textarea (en+rus)</h3>
  <p id="id_put3">3</p>
</div>
<noscript>
translit is reading!
</noscript>
<script src="new_t1e.js"></script>
<script>
function el(id){var e=document.getElementById(''+id);if(!e)alert('нет элемента='+id); return e;}
function els(s){return document.querySelectorAll(''+s);}

var input = el('id_input');
var put1 = el('id_put1');
var put2 = el('id_put2');
var put3 = el('id_put3');
var str = el('id_str');
//js enable
str.textContent=gT1E.decode(str.textContent);
function hide_p(e){e.parentElement.classList.add('hidden');}
function show_p(e){e.parentElement.classList.remove('hidden');}

function decode_text() {
 // Кириллица через HTML-сущности (работает даже в windows-1251!)
 let text=input.value;show_p(put1);show_p(put2);hide_p(put3);
 //t=t.replace(/\n/g,'\\n');
 input.value=gT1E.decode(text,1);
 put1.textContent = gT1E.decode(text,3);
 setTimeout(()=>{put1.textContent=gT1E.json16(put1.textContent);},1000);
 put2.textContent = gT1E.decode(text,2);
 setTimeout(()=>{put2.innerHTML=gT1E.decode(text,2);},1000);
}
function encode_text() {
 hide_p(put1);hide_p(put2);show_p(put3);
 var s1=gT1E.encode(input.value,1);  //old
 var s2=gT1E.encode(input.value,2); //new
 var s3=gT1E.encode(input.value,3); //cut
 put3.innerHTML='//old=//'+s1+'<br>//new=//'+s2+'<br>//fast=//'+s3;
 input.value= gT1E.encode_text(input.value);

}

function testAlert() {
 hide_p(put1);hide_p(put2);hide_p(put3);
 alert(gT1E.decode(input.value,1));
}


</script>
</body>
</html>
